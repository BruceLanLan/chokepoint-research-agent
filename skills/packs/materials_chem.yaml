id: materials_chem
name: "特种材料 / 电子化学品"
description: "光刻胶、高纯气体、特种气体、基板与电子化学品卡点。"
tags: ["materials", "chemicals", "photoresist"]
system_suffix: |
  垂直领域：材料与电子化学品。
  优先检查：纯度规格、认证周期、客户粘性、产能与资质（电子级）、出口与环保约束。
  数字必须带来源时间；区分大宗化工 vs 电子级 vs 定制配方。
focus_questions:
  - 哪一层规格最难复制（纯度 / 粒径 / 粘度 / 金属离子）？
  - 认证与导入周期是否构成时间壁垒？
  - 客户双源策略是否已经瓦解集中度假设？
  - 环保/危化/出口管制是否改变供给地图？
