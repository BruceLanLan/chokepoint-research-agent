name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest

      - name: Smoke check
        run: python scripts/smoke_check.py
        env:
          PYTHONPATH: .

      - name: Unit tests
        run: pytest -q
        env:
          PYTHONPATH: .

      - name: Offline mock pipeline + golden eval
        run: |
          python -c "from src.eval.mock_pipeline import run_mock_pipeline; r=run_mock_pipeline(); assert r['ok'], r"
          python main.py eval
        env:
          PYTHONPATH: .
