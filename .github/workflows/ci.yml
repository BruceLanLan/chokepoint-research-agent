name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest

      - name: Smoke check
        run: python scripts/smoke_check.py
        env:
          PYTHONPATH: .

      - name: Unit tests
        run: pytest -q
        env:
          PYTHONPATH: .

      - name: Offline mock pipeline + golden eval
        run: |
          python -c "from src.eval.mock_pipeline import run_mock_pipeline; r=run_mock_pipeline(); assert r['ok'], r"
          python main.py eval
        env:
          PYTHONPATH: .

      - name: Eval record + marketplace smoke
        run: |
          python main.py eval-record
          python -c "from src.ops.marketplace import marketplace_index; i=marketplace_index(); assert i['counts']['listings']>0, i"
          python -c "from src.ops.live_safety import estimate_queue_live_cost, live_costs_accepted; e=estimate_queue_live_cost(1); assert 'est_total_tokens' in e; assert live_costs_accepted(flag=False) is False"
          python -c "from src.ops.workspace_health import workspace_health_score; h=workspace_health_score(); assert 0<=h['score']<=100"
        env:
          PYTHONPATH: .
          REPORTS_DIR: ${{ runner.temp }}/reports

      - name: Upload eval history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-history-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/data/eval_history.jsonl
          if-no-files-found: ignore
