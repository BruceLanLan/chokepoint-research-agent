name: "垂直覆盖 / Vertical coverage"
description: "用深垂直包（CPO/HBM/供电/执行器/材料）跑卡点覆盖备忘"
mode: chokepoint_fast
bilingual: false
question_template: |
  使用垂直研究包「{{vertical_id}}」对系统做卡点覆盖研究。
  系统边界：{{system}}
  1) 收紧边界并列出 4–8 个物理节点（优先采用该垂直包节点表）
  2) Chokepoint Scorecard（五维 1–5 + 依据）
  3) 逐条回应该包 kill criteria；缺失则补写可监测 falsifier
  4) 证据清单：产能/供应商/替代路径/政策（带时间戳来源）
  5) 下一步研究动作（非买卖建议）
  附加上下文：{{context}}
  仅供研究学习，不构成投资建议。
notes: "变量：vertical_id (cpo_optics|hbm_packaging|power_cooling|robotics_actuators|specialty_materials), system, context。CLI 亦可 research --vertical cpo_optics"
